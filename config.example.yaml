# xiaohu-ip-studio 生图配置示例
# 用法:复制为 ~/.config/xiaohu-ip-studio/config.yaml,或跑 `python3 scripts/illo.py init` 自动生成
# 支持任何 OpenAI 兼容的图像生成端点(OpenAI 官方 / 各类兼容网关)

base_url: "https://api.openai.com/v1"   # 你的图像 API 端点
model: "gpt-image-1"                      # 图像模型名
api_key: "<在这里填你自己的 key,或用 illo.py init>"
image_size: "1024"                        # 长边像素(可选)
